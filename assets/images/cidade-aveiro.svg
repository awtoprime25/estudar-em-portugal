<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="aveiroTitle">
  <title id="aveiroTitle">Ilustração de Aveiro</title>
  <defs>
    <linearGradient id="bgAveiro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesAveiro" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bgAveiro)"/>
  <rect width="200" height="200" fill="url(#stripesAveiro)"/>
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- ria / canal -->
    <line x1="20" y1="150" x2="180" y2="150"/>
    <path d="M20 140 q10 -6 20 0 t20 0 t20 0 t20 0 t20 0 t20 0 t20 0"/>
    <!-- moliceiro -->
    <path d="M52 132 Q100 148 148 132"/>
    <path d="M60 132 C55 100 70 78 86 66"/>
  </g>
</svg>
