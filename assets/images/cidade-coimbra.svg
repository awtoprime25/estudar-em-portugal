<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="coimbraTitle">
  <title id="coimbraTitle">Ilustração de Coimbra</title>
  <defs>
    <linearGradient id="bgCoimbra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesCoimbra" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bgCoimbra)"/>
  <rect width="200" height="200" fill="url(#stripesCoimbra)"/>
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="150" x2="180" y2="150"/>
    <!-- University tower -->
    <rect x="88" y="78" width="24" height="72" rx="1.5"/>
    <path d="M88 78 L100 60 L112 78 Z"/>
    <circle cx="100" cy="98" r="7"/>
    <line x1="100" y1="105" x2="100" y2="112"/>
    <line x1="70" y1="150" x2="70" y2="128" />
    <line x1="130" y1="150" x2="130" y2="128" />
    <line x1="62" y1="128" x2="78" y2="128"/>
    <line x1="122" y1="128" x2="138" y2="128"/>
  </g>
</svg>
