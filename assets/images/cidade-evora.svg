<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="evoraTitle">
  <title id="evoraTitle">Ilustração de Évora</title>
  <defs>
    <linearGradient id="bgEvora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesEvora" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bgEvora)"/>
  <rect width="200" height="200" fill="url(#stripesEvora)"/>
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="150" x2="180" y2="150"/>
    <!-- Templo de Diana -->
    <line x1="46" y1="150" x2="46" y2="98"/>
    <line x1="66" y1="150" x2="66" y2="98"/>
    <line x1="86" y1="150" x2="86" y2="98"/>
    <line x1="106" y1="150" x2="106" y2="98"/>
    <line x1="126" y1="150" x2="126" y2="98"/>
    <line x1="146" y1="150" x2="146" y2="98"/>
    <line x1="40" y1="98" x2="152" y2="98"/>
    <line x1="34" y1="150" x2="158" y2="150"/>
  </g>
</svg>
