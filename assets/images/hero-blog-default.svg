<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="heroBlogTitle">
  <title id="heroBlogTitle">Ilustração genérica de artigo do blog Estudar em Portugal</title>
  <defs>
    <linearGradient id="bgBlog" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesBlog" width="30" height="30" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="12"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bgBlog)"/>
  <rect width="800" height="450" fill="url(#stripesBlog)"/>
  <g stroke="#3fd0e0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M280 260 L400 190 L520 260" />
    <line x1="400" y1="190" x2="400" y2="230"/>
    <path d="M300 270 v60 a8 8 0 0 0 8 8 h184 a8 8 0 0 0 8-8 v-60" />
    <line x1="360" y1="338" x2="360" y2="270"/>
    <line x1="440" y1="338" x2="440" y2="270"/>
  </g>
  <circle cx="400" cy="225" r="180" fill="none" stroke="#eafcff" stroke-opacity="0.06" stroke-width="1"/>
</svg>
