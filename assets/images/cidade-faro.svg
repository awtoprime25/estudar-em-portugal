<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="faroTitle">
  <title id="faroTitle">Ilustração de Faro</title>
  <defs>
    <linearGradient id="bgFaro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesFaro" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bgFaro)"/>
  <rect width="200" height="200" fill="url(#stripesFaro)"/>
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="150" x2="180" y2="150"/>
    <!-- Arco da Vila -->
    <path d="M70 150 V116 Q70 96 90 96 H110 Q130 96 130 116 V150"/>
    <rect x="86" y="112" width="28" height="38" rx="1.5"/>
    <line x1="60" y1="150" x2="60" y2="120"/>
    <line x1="140" y1="150" x2="140" y2="120"/>
    <!-- pássaros da Ria Formosa -->
    <path d="M40 66 q6 -6 12 0 q6 -6 12 0"/>
    <path d="M136 56 q5 -5 10 0 q5 -5 10 0"/>
  </g>
</svg>
