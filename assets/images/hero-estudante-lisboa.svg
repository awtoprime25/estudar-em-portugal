<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Ilustração: caminho de estudante do Brasil até Portugal</title>
  <defs>
    <radialGradient id="heroBg" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#12294a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <pattern id="heroStripes" width="26" height="26" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="26" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="10"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="url(#heroBg)"/>
  <rect width="400" height="400" fill="url(#heroStripes)"/>

  <!-- flight path -->
  <path d="M 78 300 C 140 250, 210 190, 300 110" fill="none" stroke="#3fd0e0" stroke-width="2" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.85"/>

  <!-- origin marker -->
  <circle cx="78" cy="300" r="6" fill="#0a1628" stroke="#3fd0e0" stroke-width="2.5"/>
  <circle cx="78" cy="300" r="2" fill="#3fd0e0"/>

  <!-- plane -->
  <g transform="translate(226,150) rotate(-32)">
    <path d="M0 0 L34 6 L0 12 L7 6 Z" fill="#eafcff"/>
  </g>

  <!-- destination: graduation cap -->
  <g transform="translate(272,84)">
    <path d="M28 0 L56 11 L28 22 L0 11 Z" fill="#3fd0e0"/>
    <path d="M14 15 L14 28 C14 33 42 33 42 28 L42 15" fill="none" stroke="#3fd0e0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="11" x2="56" y2="27" stroke="#eafcff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="56" cy="30" r="2.4" fill="#eafcff"/>
  </g>

  <!-- skyline: stylised Lisboa (Torre de Belém + Ponte 25 de Abril) -->
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <line x1="40" y1="352" x2="360" y2="352"/>
    <!-- bridge -->
    <path d="M150 352 V300 M150 300 L110 330 M150 300 L190 330 M150 300 L235 336 M150 300 L280 340"/>
    <line x1="95" y1="336" x2="300" y2="344"/>
    <!-- tower -->
    <rect x="290" y="300" width="26" height="52" rx="2"/>
    <rect x="284" y="292" width="38" height="10" rx="2"/>
    <circle cx="303" cy="284" r="5"/>
  </g>

  <circle cx="200" cy="200" r="188" fill="none" stroke="#eafcff" stroke-opacity="0.06" stroke-width="1"/>
</svg>
