<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="bragaTitle">
  <title id="bragaTitle">Ilustração de Braga</title>
  <defs>
    <linearGradient id="bgBraga" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesBraga" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bgBraga)"/>
  <rect width="200" height="200" fill="url(#stripesBraga)"/>
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bom Jesus zig-zag staircase -->
    <path d="M60 150 L140 150 L140 138 L70 138 L70 126 L130 126 L130 114 L80 114 L80 102 L120 102 L120 90 L90 90 L90 78 L110 78"/>
    <circle cx="70" cy="138" r="2.4"/>
    <circle cx="130" cy="126" r="2.4"/>
    <circle cx="80" cy="114" r="2.4"/>
    <circle cx="120" cy="102" r="2.4"/>
    <path d="M100 78 L100 66 L94 60 L106 60 Z"/>
  </g>
</svg>
