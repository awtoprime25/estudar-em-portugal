<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="portoTitle">
  <title id="portoTitle">Ilustração do Porto</title>
  <defs>
    <linearGradient id="bgPorto" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a4c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="stripesPorto" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#1ab8c8" stroke-opacity="0.10" stroke-width="8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bgPorto)"/>
  <rect width="200" height="200" fill="url(#stripesPorto)"/>
  <g stroke="#3fd0e0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="150" x2="182" y2="150"/>
    <!-- Dom Luís I arch -->
    <path d="M40 150 Q100 66 160 150"/>
    <line x1="100" y1="86" x2="100" y2="150"/>
    <line x1="66" y1="118" x2="66" y2="150"/>
    <line x1="134" y1="118" x2="134" y2="150"/>
    <line x1="40" y1="122" x2="160" y2="122"/>
  </g>
</svg>
